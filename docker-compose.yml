services:
  postgres_db:
    image: postgres:15-alpine
    container_name: funnel_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Ro22874009"
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./backend/database/data:/var/lib/postgresql/data

